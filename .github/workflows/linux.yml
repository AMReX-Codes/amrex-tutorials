name: linux

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

concurrency:
  group: ${{ github.ref }}-${{ github.head_ref }}-linux
  cancel-in-progress: true

jobs:

  # Build all tutorials
  tutorials_build:
    name: GNU [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-Werror -Wshadow -Woverloaded-virtual -Wunreachable-code -fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies.sh
    - name: Build & Install
      run: |
        cd ExampleCodes
        cmake -S . -B build             \
            -DCMAKE_BUILD_TYPE=Debug    \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DAMReX_LINEAR_SOLVERS=ON   \
            -DAMReX_FORTRAN=ON          \
            -DAMReX_FORTRAN_INTERFACES=ON \
            -DAMReX_EB=ON                \
            -DAMReX_PARTICLES=ON        \
            -DTUTORIAL_PYTHON=ON
        cmake --build build -j 2
        cmake --build build -j 2 --target pyamrex_pip_install
    - name: Run Python
      run: |
        cd GuidedTutorials/MultiFab/
        python3 main.py
        cd ../HeatEquation/Source/
        python3 main.py ../Exec/inputs
        mpiexec -n 2 python3 main.py ../Exec/inputs

  # Build all tutorials
  tutorials_omp:
    name: GNU OMP [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-Werror -Wno-error=deprecated-declarations -Wshadow -Woverloaded-virtual -Wunreachable-code -fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies.sh
    - name: Build & Install
      run: |
        cd ExampleCodes
        cmake -S . -B build             \
            -DCMAKE_BUILD_TYPE=Debug    \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DAMReX_OMP=ON              \
            -DAMReX_PARTICLES=ON        \
            -DAMReX_LINEAR_SOLVERS=ON   \
            -DAMReX_FORTRAN=ON          \
            -DAMReX_FORTRAN_INTERFACES=ON \
            -DAMReX_EB=ON               \
            -DTUTORIAL_PYTHON=ON
        cmake --build build -j 2
        cmake --build build -j 2 --target pyamrex_pip_install
    - name: Run Python
      run: |
        cd GuidedTutorials/MultiFab/
        python3 main.py
        cd ../HeatEquation/Source/
        python3 main.py ../Exec/inputs

  tutorials_clang:
    name: Clang SP Particles DP Mesh Debug [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-Werror -Wshadow -Woverloaded-virtual -Wextra-semi -Wunreachable-code -fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies_clang.sh 18
    - name: Build & Install
      run: |
        cd ExampleCodes
        cmake -S . -B build             \
            -DCMAKE_BUILD_TYPE=Debug                  \
            -DCMAKE_VERBOSE_MAKEFILE=ON               \
            -DAMReX_MPI=OFF                           \
            -DAMReX_PARTICLES=ON                      \
            -DAMReX_LINEAR_SOLVERS=ON     \
            -DAMReX_FORTRAN=ON          \
            -DAMReX_FORTRAN_INTERFACES=ON \
            -DAMReX_EB=ON                 \
            -DAMReX_PRECISION=DOUBLE                  \
            -DAMReX_PARTICLES_PRECISION=SINGLE        \
            -DTUTORIAL_PYTHON=ON          \
            -DCMAKE_C_COMPILER=$(which clang)         \
            -DCMAKE_CXX_COMPILER=$(which clang++)     \
            -DCMAKE_Fortran_COMPILER=$(which gfortran)
        cmake --build build -j 2
        cmake --build build -j 2 --target pyamrex_pip_install
    - name: Run Python
      run: |
        cd GuidedTutorials/MultiFab/
        python3 main.py
        cd ../HeatEquation/Source/
        python3 main.py ../Exec/inputs

  # Build all tutorials w/o MPI
  tutorials-nonmpi:
    name: GNU NOMPI [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-Werror -Wshadow -Woverloaded-virtual -Wunreachable-code -fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies.sh
    - name: Build & Install
      run: |
        cd ExampleCodes
        cmake -S . -B build             \
            -DCMAKE_BUILD_TYPE=Debug    \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DAMReX_MPI=OFF             \
            -DAMReX_LINEAR_SOLVERS=ON     \
            -DAMReX_FORTRAN=ON          \
            -DAMReX_FORTRAN_INTERFACES=ON \
            -DAMReX_EB=ON                 \
            -DAMReX_PARTICLES=ON         \
            -DTUTORIAL_PYTHON=ON
        cmake --build build -j 2
        cmake --build build -j 2 --target pyamrex_pip_install
    - name: Run Python
      run: |
        cd GuidedTutorials/MultiFab/
        python3 main.py
        cd ../HeatEquation/Source/
        python3 main.py ../Exec/inputs

  # Build all tutorials
  tutorials-nofortran:
    name: GNU w/o Fortran [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-Werror -Wshadow -Woverloaded-virtual -Wunreachable-code -fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies.sh
    - name: Build & Install
      run: |
        cd ExampleCodes
        cmake -S . -B build             \
            -DCMAKE_BUILD_TYPE=Debug    \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DAMReX_LINEAR_SOLVERS=ON     \
            -DAMReX_EB=ON                 \
            -DAMReX_PARTICLES=ON       \
            -DAMReX_FORTRAN=OFF        \
            -DTUTORIAL_PYTHON=ON
        cmake --build build -j 2
        cmake --build build -j 2 --target pyamrex_pip_install
    - name: Run Python
      run: |
        cd GuidedTutorials/MultiFab/
        python3 main.py
        cd ../HeatEquation/Source/
        python3 main.py ../Exec/inputs

  # Build all tutorials with CUDA
  tutorials-cuda:
    name: CUDA Release [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies_nvcc.sh 12.6
    - name: Build & Install
      run: |
        export PATH=/usr/local/nvidia/bin:/usr/local/cuda/bin:${PATH}
        export LD_LIBRARY_PATH=/usr/local/nvidia/lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64:${LD_LIBRARY_PATH}
        which nvcc || echo "nvcc not in PATH!"
        cd ExampleCodes
        cmake -S . -B build                              \
            -DCMAKE_VERBOSE_MAKEFILE=ON                  \
            -DAMReX_PARTICLES=ON                         \
            -DAMReX_LINEAR_SOLVERS=ON     \
            -DAMReX_FORTRAN=ON          \
            -DAMReX_FORTRAN_INTERFACES=ON \
            -DAMReX_EB=ON                 \
            -DAMReX_GPU_BACKEND=CUDA                     \
            -DCMAKE_C_COMPILER=$(which gcc)              \
            -DCMAKE_CXX_COMPILER=$(which g++)            \
            -DCMAKE_CUDA_HOST_COMPILER=$(which g++)      \
            -DCMAKE_Fortran_COMPILER=$(which gfortran)   \
            -DAMReX_CUDA_ARCH=8.0                        \
            -DAMReX_CUDA_ERROR_CROSS_EXECUTION_SPACE_CALL=ON \
            -DAMReX_CUDA_ERROR_CAPTURE_THIS=ON

        cmake --build build -j 2

  tutorials-dpcpp:
    name: DPCPP [tutorials]
    runs-on: ubuntu-24.04
    env: {CXXFLAGS: "-fno-operator-names"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies_dpcpp.sh
    - name: Build & Install
      run: |
        set +e
        source /opt/intel/oneapi/setvars.sh
        set -e
        cd ExampleCodes
        cmake -S . -B build                                \
            -DCMAKE_VERBOSE_MAKEFILE=ON                    \
            -DAMReX_LINEAR_SOLVERS=ON     \
            -DAMReX_EB=ON                 \
            -DAMReX_PARTICLES=ON                           \
            -DAMReX_GPU_BACKEND=SYCL                       \
            -DCMAKE_C_COMPILER=$(which icx)              \
            -DCMAKE_CXX_COMPILER=$(which icpx)            \
            -DCMAKE_Fortran_COMPILER=$(which ifx)
        cmake --build build --parallel 2

  tutorials-hip:
    name: HIP ROCm GFortran [tutorials]
    runs-on: ubuntu-24.04
    # Have to have -Wno-deprecated-declarations due to deprecated atomicAddNoRet
    # Have to have -Wno-gnu-zero-variadic-macro-arguments to avoid
    #    amrex/Src/Base/AMReX_GpuLaunchGlobal.H:15:5: error: must specify at least one argument for '...' parameter of variadic macro [-Werror,-Wgnu-zero-variadic-macro-arguments]
    #        __launch_bounds__(amrex_launch_bounds_max_threads)
    #        ^
    #    /opt/rocm-4.1.1/hip/include/hip/hcc_detail/hip_runtime.h:178:71: note: expanded from macro '__launch_bounds__'
    #        select_impl_(__VA_ARGS__, launch_bounds_impl1, launch_bounds_impl0)(__VA_ARGS__)
    #                                                                          ^
    #    /opt/rocm-4.1.1/hip/include/hip/hcc_detail/hip_runtime.h:176:9: note: macro 'select_impl_' defined here
    #    #define select_impl_(_1, _2, impl_, ...) impl_
    env: {CXXFLAGS: "-Werror -Wall -Wextra -Wpedantic -Wnull-dereference -Wfloat-conversion -Wshadow -Woverloaded-virtual -Wextra-semi -Wunreachable-code -Wno-deprecated-declarations -Wno-gnu-zero-variadic-macro-arguments -Wno-pass-failed"}
    steps:
    - uses: actions/checkout@v6
    - name: Dependencies
      run: .github/workflows/dependencies/dependencies_hip.sh
    - name: Build & Install
      run: |
        source /etc/profile.d/rocm.sh
        hipcc --version
        which clang
        which clang++
        cmake --version

        # "mpic++ --showme" forgets open-pal in Ubuntu 24.04 + OpenMPI 4.0.3
        #   https://bugs.launchpad.net/ubuntu/+source/openmpi/+bug/1941786
        #   https://github.com/open-mpi/ompi/issues/9317
        export LDFLAGS="-lopen-pal"

        cd ExampleCodes
        cmake -S . -B build_nofortran                     \
            -DCMAKE_VERBOSE_MAKEFILE=ON                   \
            -DAMReX_EB=ON                                 \
            -DAMReX_ENABLE_TESTS=ON                       \
            -DAMReX_PARTICLES=ON                          \
            -DAMReX_FORTRAN=OFF                           \
            -DAMReX_LINEAR_SOLVERS=ON                     \
            -DAMReX_GPU_BACKEND=HIP                       \
            -DAMReX_AMD_ARCH=gfx908                       \
            -DCMAKE_C_COMPILER=$(which clang)             \
            -DCMAKE_CXX_COMPILER=$(which clang++)
        cmake --build build_nofortran -j 2

